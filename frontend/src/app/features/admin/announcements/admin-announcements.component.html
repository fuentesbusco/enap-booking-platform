<div class="p-6">
  <!-- Cabecera de Avisos -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="font-display text-3xl text-charcoal font-semibold">Avisos</h1>
      <p class="text-charcoal/45 text-sm mt-1">
        Noticias y anuncios de interés general visibles en la página principal.
      </p>
    </div>
    <button (click)="openCreateModal()" class="btn-primary flex items-center gap-2 text-sm shadow-card hover:shadow-card-hover transition-all duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      Nuevo Aviso
    </button>
  </div>

  <!-- Listado de Avisos -->
  <div class="space-y-4">
    <div *ngFor="let a of announcements" class="card p-5">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <h3 class="font-semibold text-charcoal text-base">{{ a.title }}</h3>
            <span *ngIf="a.is_pinned" class="badge-green">Destacado</span>
            <span class="badge-blue">Publicado</span>
          </div>
          <p class="text-charcoal/55 text-sm mt-1.5 leading-relaxed">{{ a.body }}</p>
          <p class="text-xs font-mono text-charcoal/30 mt-3 flex items-center gap-1">
            📅 {{ a.published_at | date: "d MMM yyyy" }}
          </p>
        </div>
        <div class="flex gap-2 shrink-0">
          <button
            (click)="deleteAnnouncement(a.id)"
            [disabled]="loading"
            [class.opacity-50]="loading"
            class="text-xs text-red-500 hover:bg-red-50 border border-red-100 hover:border-red-200 px-3 py-1.5 rounded-lg active:scale-95 transition-all font-medium cursor-pointer"
          >
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <!-- Vacío -->
    <div *ngIf="announcements.length === 0" class="card p-12 text-center">
      <span class="text-3xl block mb-2">📢</span>
      <p class="text-charcoal/40 text-sm">No hay avisos registrados actualmente.</p>
    </div>
  </div>

  <!-- Modal Formulario de Nuevo Aviso -->
  <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto">
    <!-- Backdrop oscuro -->
    <div (click)="closeModal()" class="absolute inset-0 bg-charcoal/40 backdrop-blur-xs transition-opacity duration-300"></div>

    <!-- Contenido del Modal -->
    <div class="bg-white rounded-2xl shadow-float max-w-md w-full relative z-10 overflow-hidden border border-charcoal/10 transition-transform duration-300 scale-100 flex flex-col">
      <!-- Encabezado -->
      <div class="px-6 py-4 bg-forest text-white flex items-center justify-between">
        <h2 class="font-display text-xl font-semibold">Crear Nuevo Aviso</h2>
        <button (click)="closeModal()" class="text-white/70 hover:text-white transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="saveAnnouncement()" class="p-6 space-y-4">
        <!-- Título -->
        <div>
          <label class="block text-xs font-semibold text-charcoal/60 uppercase tracking-wider mb-1">Título del aviso *</label>
          <input type="text" name="title" [(ngModel)]="formTitle" placeholder="Ej: Mantención de piscinas" required class="input" />
        </div>

        <!-- Contenido -->
        <div>
          <label class="block text-xs font-semibold text-charcoal/60 uppercase tracking-wider mb-1">Cuerpo / Contenido *</label>
          <textarea name="body" [(ngModel)]="formBody" placeholder="Escribe el contenido detallado del aviso..." required rows="4" class="input py-2.5"></textarea>
        </div>

        <!-- Destacado -->
        <div class="flex items-center gap-2 pt-1">
          <input type="checkbox" name="isPinned" [(ngModel)]="formIsPinned" id="isPinned" class="rounded border-charcoal/20 text-forest focus:ring-forest/30" />
          <label for="isPinned" class="text-sm text-charcoal/70 select-none cursor-pointer">Destacar aviso (aparecerá arriba de los demás)</label>
        </div>

        <!-- Botones de Acción -->
        <div class="flex items-center justify-end gap-3 pt-4 border-t border-charcoal/5">
          <button type="button" (click)="closeModal()" [disabled]="loading" class="btn-secondary text-sm cursor-pointer">
            Cancelar
          </button>
          <button type="submit" [disabled]="loading" class="btn-primary text-sm flex items-center gap-1.5 cursor-pointer">
            <span *ngIf="loading" class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-white border-t-transparent"></span>
            Guardar Aviso
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
