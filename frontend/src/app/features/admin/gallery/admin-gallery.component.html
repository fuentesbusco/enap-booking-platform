<div class="p-6">
  <!-- Cabecera de Galería -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="font-display text-3xl text-charcoal font-semibold">Galería</h1>
      <p class="text-charcoal/45 text-sm mt-1">
        Administra las imágenes que se muestran públicamente en la sección "Conoce el Centro".
      </p>
    </div>
    <button (click)="openCreateModal()" class="btn-primary flex items-center gap-2 text-sm shadow-card hover:shadow-card-hover transition-all duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      Añadir Imagen
    </button>
  </div>

  <!-- Listado de Imágenes -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div *ngFor="let item of items" class="card p-4 flex gap-4 items-center">
      <!-- Miniatura de Imagen -->
      <div class="w-24 h-16 rounded-lg overflow-hidden bg-mist shrink-0 border border-charcoal/5">
        <img [src]="item.image_url" [alt]="item.title" class="w-full h-full object-cover" />
      </div>

      <!-- Detalles -->
      <div class="flex-1 min-w-0">
        <h3 class="font-semibold text-charcoal text-sm truncate">{{ item.title }}</h3>
        <p *ngIf="item.description" class="text-charcoal/50 text-xs truncate mt-0.5">{{ item.description }}</p>
        <span class="text-[10px] font-mono text-charcoal/30 block mt-1 truncate">{{ item.image_url }}</span>
      </div>

      <!-- Botón de Acción -->
      <button
        (click)="deleteGalleryItem(item.id)"
        [disabled]="loading"
        class="text-xs text-red-500 hover:bg-red-50 border border-red-100 hover:border-red-200 px-3 py-1.5 rounded-lg shrink-0 transition-all font-medium cursor-pointer"
      >
        Eliminar
      </button>
    </div>

    <!-- Vacío -->
    <div *ngIf="items.length === 0" class="col-span-2 card p-12 text-center">
      <span class="text-3xl block mb-2">🖼️</span>
      <p class="text-charcoal/40 text-sm">No hay imágenes en la galería actualmente.</p>
    </div>
  </div>

  <!-- Modal Formulario de Nueva Imagen -->
  <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto">
    <!-- Backdrop oscuro -->
    <div (click)="closeModal()" class="absolute inset-0 bg-charcoal/40 backdrop-blur-xs transition-opacity duration-300"></div>

    <!-- Contenido del Modal -->
    <div class="bg-white rounded-2xl shadow-float max-w-lg w-full relative z-10 overflow-hidden border border-charcoal/10 transition-transform duration-300 scale-100 flex flex-col my-8">
      <!-- Encabezado -->
      <div class="px-6 py-4 bg-forest text-white flex items-center justify-between">
        <h2 class="font-display text-xl font-semibold">Añadir Imagen a Galería</h2>
        <button (click)="closeModal()" class="text-white/70 hover:text-white transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="saveGalleryItem()" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
        <!-- Título -->
        <div>
          <label class="block text-xs font-semibold text-charcoal/60 uppercase tracking-wider mb-1">Título de la foto *</label>
          <input type="text" name="title" [(ngModel)]="formTitle" placeholder="Ej: Piscina en el atardecer" required class="input" />
        </div>

        <!-- Descripción -->
        <div>
          <label class="block text-xs font-semibold text-charcoal/60 uppercase tracking-wider mb-1">Descripción corta (Opcional)</label>
          <textarea name="description" [(ngModel)]="formDescription" placeholder="Ej: Vista del sector familiar rodeado de palmeras..." rows="2" class="input py-2.5"></textarea>
        </div>

        <!-- Carga de Imagen -->
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-charcoal/60 uppercase tracking-wider mb-1">Imagen de la galería *</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden" #fileInputGallery />
            <button type="button" (click)="fileInputGallery.click()" [disabled]="uploadingImage" class="btn-secondary text-xs py-2.5 w-full flex items-center justify-center gap-1.5 cursor-pointer">
              <span>📁</span>
              {{ uploadingImage ? 'Subiendo imagen a S3...' : 'Seleccionar e iniciar carga a S3' }}
            </button>
          </div>

          <!-- Vista previa -->
          <div class="relative h-40 w-full rounded-xl overflow-hidden border border-charcoal/10 bg-mist flex items-center justify-center" *ngIf="formImageUrl">
            <img [src]="formImageUrl" class="w-full h-full object-cover" />
            <span class="absolute top-2 left-2 px-2 py-0.5 rounded bg-charcoal/80 text-white text-[9px] font-mono">Imagen Subida</span>
          </div>
        </div>

        <!-- Botones de Acción -->
        <div class="flex items-center justify-end gap-3 pt-4 border-t border-charcoal/5">
          <button type="button" (click)="closeModal()" [disabled]="loading" class="btn-secondary text-sm cursor-pointer">
            Cancelar
          </button>
          <button type="submit" [disabled]="loading || !formImageUrl || !formTitle.trim()" class="btn-primary text-sm flex items-center gap-1.5 cursor-pointer">
            <span *ngIf="loading" class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-white border-t-transparent"></span>
            Guardar Imagen
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
