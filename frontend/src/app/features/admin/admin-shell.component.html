<div class="flex min-h-screen bg-mist font-body">
  <!-- Sidebar -->
  <aside
    class="w-56 shrink-0 bg-forest min-h-screen flex flex-col sticky top-0 h-screen overflow-y-auto"
  >
    <div class="p-4 border-b border-white/10">
      <div class="flex items-center gap-2">
        <div
          class="w-7 h-7 bg-sand rounded-md flex items-center justify-center shrink-0"
        >
          <span class="text-charcoal font-bold text-xs font-mono">E</span>
        </div>
        <div class="leading-none">
          <p class="text-white font-semibold text-xs">Administración</p>
          <p class="text-white/40 text-[10px]">Sindicato ENAP</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-3 space-y-0.5 pt-4">
      <a
        *ngFor="let item of nav"
        [routerLink]="['/admin', item.path]"
        routerLinkActive="bg-white/15 text-white"
        class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-white/55 hover:bg-white/10 hover:text-white transition-all text-sm"
      >
        <span>{{ item.icon }}</span>
        {{ item.label }}
      </a>
    </nav>

    <div class="p-4 border-t border-white/10">
      <p class="text-white/40 text-xs truncate mb-1.5">
        {{ auth.currentUser()?.full_name }}
      </p>
      <button
        (click)="auth.logout()"
        class="text-white/30 hover:text-white text-xs transition-colors"
      >
        Cerrar sesión →
      </button>
    </div>
  </aside>

  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>
</div>
